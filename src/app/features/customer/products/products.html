<div class="products-page">

  <app-navbar></app-navbar>

  <!-- Mobile Filter Button -->
  <div class="mobile-filter-bar">
    <button (click)="toggleFilters()">
      <i class="fas fa-filter"></i> Filters
    </button>
  </div>

  <div class="products-layout">

    <!-- Sticky Sidebar -->
    <aside class="filters-sidebar"
           [class.closed]="!isFilterOpen">

      <div class="filters-header">
        <h3>Filters</h3>
        <button (click)="clearFilters()">Clear</button>
      </div>

      <form [formGroup]="filterForm">

        <input type="text"
               formControlName="search"
               placeholder="Search products">

        <select formControlName="category">
          <option value="">All Categories</option>
          <option value="Electronics">Electronics</option>
          <option value="Clothing">Clothing</option>
          <option value="Sports">Sports</option>
        </select>

        <select formControlName="brand">
          <option value="">All Brands</option>
          <option value="Nike">Nike</option>
          <option value="Adidas">Adidas</option>
          <option value="Samsung">Samsung</option>
          <option value="Apple">Apple</option>
        </select>

        <div class="price-range">
          <input type="number" formControlName="minPrice" placeholder="Min">
          <input type="number" formControlName="maxPrice" placeholder="Max">
        </div>

        <select formControlName="rating">
          <option value="">All Ratings</option>
          <option value="4">4+ Stars</option>
          <option value="3">3+ Stars</option>
        </select>

      </form>

    </aside>

    <!-- Products -->
    <main class="products-content">

      <div class="products-grid">

        <app-product-card
          *ngFor="let product of displayedProducts"
          [product]="product" routerLink="/products/1">
        </app-product-card>

      </div>

    </main>

  </div>

  <app-footer></app-footer>

</div>
