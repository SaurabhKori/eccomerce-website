<app-navbar></app-navbar>

<!-- 🔥 HERO CAROUSEL -->
<section class="py-6 bg-gray-100">
 <section class="py-6 bg-gray-100">
  <div class="container mx-auto">

    <swiper-container
      loop="true"
      autoplay-delay="3000"
      pagination="true"
      pagination-clickable="true"
      class="rounded-xl overflow-hidden shadow-lg">

      <swiper-slide *ngFor="let banner of banners">
        <img [src]="banner.image"
             class="w-full h-[400px] object-cover"
             alt="Banner">
      </swiper-slide>

    </swiper-container>

  </div>
</section>
</section>

<!-- 🛍 CATEGORY SECTION -->
<section class="container py-12">
  <h2 class="text-3xl font-bold mb-8 text-center">Shop by Category</h2>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
    <div *ngFor="let category of categories"
         class="bg-white rounded-xl shadow-md p-6 text-center cursor-pointer 
                hover:shadow-xl hover:-translate-y-2 transition duration-300">
      <i [class]="category.icon + ' text-4xl text-orange-500 mb-3'"></i>
      <h3 class="font-semibold text-lg">{{category.name}}</h3>
      <p class="text-gray-500 text-sm">
        {{category.productCount}} Products
      </p>
    </div>
  </div>
</section>

<!-- ⭐ FEATURED PRODUCTS -->
<section class="container py-12">
  <h2 class="text-3xl font-bold mb-8">Featured Products</h2>

  <div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-4 gap-6">
    <app-skeleton-loader *ngFor="let i of [1,2,3,4]"></app-skeleton-loader>
  </div>

  <div *ngIf="!loading"
       class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <app-product-card
      *ngFor="let product of featuredProducts"
      [product]="product">
    </app-product-card>
  </div>
</section>

<!-- 🎁 OFFERS SECTION -->
<section class="bg-gray-100 py-12">
  <div class="container">
    <h2 class="text-3xl font-bold mb-8">Special Offers</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div *ngFor="let offer of offers"
           class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition">
        <div class="relative">
          <img [src]="offer.image"
               class="w-full h-48 object-cover">
          <div class="absolute top-3 left-3 bg-red-500 text-white px-3 py-1 rounded-full text-sm">
            {{offer.discount}}% OFF
          </div>
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-lg">{{offer.title}}</h3>
          <p class="text-gray-500 text-sm">{{offer.description}}</p>
        </div>
      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>
